{% extends "preference_app/base.html" %}
{% load static %}

{% block title %}Contact Us — PreferenceAI{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
  <div style="text-align: center; margin-bottom: 48px;" data-animate class="visible">
    <h1 style="margin-bottom: 16px;">Get in <span class="gradient-text">Touch</span></h1>
    <p>Have questions about your AI profile? We're here to help.</p>
  </div>

  <div class="glass-panel visible" style="padding: 40px; margin-bottom: 100px; transition-delay: 0.1s;" data-animate>
    <form action="#" method="POST">
      {% csrf_token %}
      <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; color: var(--text-gray);">Full Name</label>
        <input type="text" class="form-input" placeholder="Your name" required />
      </div>
      <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; color: var(--text-gray);">Email Address</label>
        <input type="email" class="form-input" placeholder="your@email.com" required />
      </div>
      <div style="margin-bottom: 32px;">
        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; color: var(--text-gray);">Message</label>
        <textarea class="form-input" style="min-height: 150px; resize: vertical;" placeholder="How can we help you?" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">Send Message</button>
    </form>
    
    <div style="margin-top: 40px; padding-top: 40px; border-top: 1px solid var(--glass-stroke); display: flex; flex-direction: column; gap: 16px;">
      <div style="display: flex; align-items: center; gap: 12px; color: var(--text-gray); font-size: 0.9rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>+1 (555) 000-0000</span>
      </div>
      <div style="display: flex; align-items: center; gap: 12px; color: var(--text-gray); font-size: 0.9rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>support@preferenceai.com</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}
