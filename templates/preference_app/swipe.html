{% extends "preference_app/base.html" %}
{% load static %}

{% block title %}Match Your Style — PreferenceAI{% endblock %}

{% block extra_head %}
<!-- Hammer.js for Touch Gestures -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

<style>
.swipe-stage {
    position: relative;
    width: 100%;
    max-width: 360px;
    height: 520px;
    margin: 40px auto;
    perspective: 1000px;
}

.swipe-card {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-stroke);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: grab;
    transition: transform 0.4s var(--ease-premium), opacity 0.3s ease;
    will-change: transform;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.swipe-card:active { cursor: grabbing; }

.swipe-card img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    pointer-events: none;
    border-bottom: 1px solid var(--glass-stroke);
}

.swipe-indicator {
    position: absolute;
    top: 30px;
    padding: 8px 16px;
    border: 3px solid;
    border-radius: var(--radius-sm);
    font-weight: 800;
    font-size: 1.5rem;
    text-transform: uppercase;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
}
.indicator-like {
    right: 30px;
    color: var(--success);
    border-color: var(--success);
    transform: rotate(15deg);
}
.indicator-dislike {
    left: 30px;
    color: var(--danger);
    border-color: var(--danger);
    transform: rotate(-15deg);
}

@media (max-width: 480px) {
    .swipe-stage { height: 460px; max-width: 320px; }
    .swipe-card img { height: 320px; }
}
</style>
{% endblock %}

{% block content %}
<!-- In templates/preference_app/swipe.html -->

<!-- Card container -->
<div id="swipe-container" style="position:relative; width:320px; height:420px; margin:auto;">
    <div id="card-stack"></div>
    <p id="progress-text" style="text-align:center; margin-top:10px;">
        Loading...
    </p>
</div>

<!-- Like / Dislike buttons -->
<div style="text-align:center; margin-top:20px;">
    <button onclick="swipe('dislike')" 
            style="background:#e74c3c; color:white; padding:12px 30px; 
                   border:none; border-radius:25px; font-size:16px; cursor:pointer; margin:5px;">
        ✕ Dislike
    </button>
    <button onclick="swipe('like')" 
            style="background:#27ae60; color:white; padding:12px 30px; 
                   border:none; border-radius:25px; font-size:16px; cursor:pointer; margin:5px;">
        ♥ Like
    </button>
</div>

<!-- Hidden form to submit results -->
<form id="swipe-form" method="POST" action="{% url 'submit_swipe' %}">
    {% csrf_token %}
    <input type="hidden" name="swipe_data" id="swipe-data-input">
</form>

<script>
    // Items passed from Django view
    const items  = {{ items_json|safe }};
    let current  = 0;
    let responses = [];

    function showCard(index) {
        const stack = document.getElementById('card-stack');
        const prog  = document.getElementById('progress-text');

        if (index >= items.length) {
            // All items swiped — auto-submit
            document.getElementById('swipe-data-input').value = JSON.stringify(responses);
            document.getElementById('swipe-form').submit();
            return;
        }

        const item = items[index];
        prog.textContent = `${index + 1} of ${items.length}`;

        stack.innerHTML = `
            <div style="background:white; border-radius:16px; 
                        box-shadow:0 4px 20px rgba(0,0,0,0.15); 
                        overflow:hidden; width:320px;">
                <img src="${item.image_url}" 
                     alt="${item.name}"
                 onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=300&auto=format'"
                     style="width:100%; height:280px; object-fit:cover;">
                <div style="padding:16px;">
                    <h3 style="margin:0 0 4px 0;">${item.name}</h3>
                    <p style="margin:0; color:#666; font-size:14px;">
                        ${item.item_type} · ${item.material} · ${item.price_range}
                    </p>
                </div>
            </div>`;
    }

    function swipe(action) {
        if (current >= items.length) return;
        
        // Record this swipe
        responses.push({
            item_id: items[current].id,
            action:  action
        });
        
        current++;
        showCard(current);
    }

    // Keyboard shortcuts: ArrowRight = like, ArrowLeft = dislike
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') swipe('like');
        if (e.key === 'ArrowLeft')  swipe('dislike');
    });

    // Start
    showCard(0);
</script>
{% endblock %}


{% block extra_scripts %}
<script>
let items = [];
let currentIndex = 0;
let likedIds = [];
let dislikedIds = [];

// Prevent default dragging of images
document.addEventListener('dragstart', (e) => {
    if(e.target.tagName === 'IMG') e.preventDefault();
});

// Load the catalog
fetch("/swipe/images/")
    .then(r => r.json())
    .then(data => {
        if(data.items && data.items.length > 0) {
            items = data.items;
            renderCards();
        } else {
            alert("Could not load catalog images.");
        }
    });

function renderCards() {
    const container = document.getElementById("swipe-container");
    container.innerHTML = "";
    
    // Render in reverse so the first item is on top (highest z-index)
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        const card = document.createElement("div");
        card.className = "swipe-card";
        card.dataset.id = item.id;
        card.dataset.index = i;
        
        card.innerHTML = `
            <div class="swipe-indicator indicator-like">LOVE IT</div>
            <div class="swipe-indicator indicator-dislike">NOPE</div>
            <img src="${item.image_url}" alt="${item.name}" crossorigin="anonymous">
            <div style="padding: 24px; text-align: center;">
                <h4 style="margin-bottom: 4px; color: white;">${item.name}</h4>
                <p style="font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;">${item.item_type} &bull; ${item.style}</p>
            </div>
        `;
        
        container.appendChild(card);
        
        if (i === 0) {
            initHammer(card);
        }
    }
    updateProgress();
}

function initHammer(card) {
    const hammertime = new Hammer(card);
    
    hammertime.on("pan", function(ev) {
        if (ev.deltaX === 0) return;
        if (ev.center.x === 0 && ev.center.y === 0) return;

        card.style.transition = 'none';
        
        // Tilt effect
        let rotate = ev.deltaX * 0.05;
        card.style.transform = `translate(${ev.deltaX}px, ${ev.deltaY}px) rotate(${rotate}deg)`;

        // Show Indicators
        const likeInd = card.querySelector('.indicator-like');
        const dislikeInd = card.querySelector('.indicator-dislike');
        
        if (ev.deltaX > 50) {
            likeInd.style.opacity = Math.min(ev.deltaX / 100, 1);
            dislikeInd.style.opacity = 0;
        } else if (ev.deltaX < -50) {
            dislikeInd.style.opacity = Math.min(Math.abs(ev.deltaX) / 100, 1);
            likeInd.style.opacity = 0;
        } else {
            likeInd.style.opacity = 0;
            dislikeInd.style.opacity = 0;
        }
    });

    hammertime.on("panend", function(ev) {
        card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        
        // Threshold to trigger swipe action
        if (ev.deltaX > 100) {
            throwCard(card, 1); // Like
        } else if (ev.deltaX < -100) {
            throwCard(card, -1); // Dislike
        } else {
            // Reset position
            card.style.transform = '';
            card.querySelector('.indicator-like').style.opacity = 0;
            card.querySelector('.indicator-dislike').style.opacity = 0;
        }
    });
}

function handleAction(isLike) {
    const cards = document.querySelectorAll('.swipe-card');
    if (cards.length === 0) return;
    
    // The top card is the last child in the DOM due to reverse rendering
    const topCard = cards[cards.length - 1];
    
    if (isLike) {
        topCard.querySelector('.indicator-like').style.opacity = 1;
        throwCard(topCard, 1);
    } else {
        topCard.querySelector('.indicator-dislike').style.opacity = 1;
        throwCard(topCard, -1);
    }
}

function throwCard(card, direction) {
    const itemId = parseInt(card.dataset.id);
    
    // Throw animation
    card.style.transform = `translate(${direction * window.innerWidth}px, 50px) rotate(${direction * 30}deg)`;
    card.style.opacity = 0;
    
    // Record action
    if (direction === 1) {
        likedIds.push(itemId);
    } else {
        dislikedIds.push(itemId);
    }
    
    setTimeout(() => {
        card.remove();
        currentIndex++;
        updateProgress();
        
        const nextCards = document.querySelectorAll('.swipe-card');
        if (nextCards.length > 0) {
            // Initialize hammer on the new top card
            initHammer(nextCards[nextCards.length - 1]);
        } else {
            submitSwipeResults();
        }
    }, 300);
}

function updateProgress() {
    const total = items.length;
    const currentCount = currentIndex;
    const pct = total === 0 ? 0 : Math.round((currentCount / total) * 100);
    
    document.getElementById("progress-text").innerText = `${currentCount} / ${total} ITEMS`;
    document.getElementById("progress-pct-text").innerText = `${pct}%`;
    document.getElementById("progress-bar").style.width = pct + "%";
}

function submitSwipeResults() {
    const payload = {
        liked_ids: likedIds,
        disliked_ids: dislikedIds
    };
    
    fetch('/swipe/submit/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if(data.ok) {
            window.location.href = '/dashboard/';
        } else {
            alert('Error submitting swipe data.');
        }
    })
    .catch(err => console.error(err));
}

// Helper to get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
